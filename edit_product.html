<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - Thrift Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/popup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        .upload-container { padding: 40px; display: flex; justify-content: center; }
        .upload-card { background: var(--bg-primary); padding: 30px; border-radius: var(--radius-sm); box-shadow: var(--shadow-md); max-width: 900px; width: 100%; }
        .form-title { margin-bottom: 20px; font-size: 18px; font-weight: 600; color: var(--text-main); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text-muted); }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
            background: var(--bg-secondary); color: var(--text-main); box-sizing: border-box;
        }
        .form-group textarea { resize: vertical; min-height: 100px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .image-upload-area {
            border: 2px dashed var(--border); padding: 32px; text-align: center; border-radius: var(--radius-sm);
            cursor: pointer; margin-top: 8px;
        }
        .image-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; margin-top: 16px; }
        .image-preview-item img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
        .submit-btn { background: var(--text-main); color: white; border: none; padding: 14px 24px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; }
        .cancel-btn { background: none; border: 1px solid var(--border); color: var(--text-main); padding: 14px 24px; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; text-decoration: none; display: inline-block; text-align: center; }
        .form-actions { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
        #geocoder-results { position: absolute; top: 100%; left: 0; right: 0; background: white; z-index: 1000; border: 1px solid var(--border); display: none; max-height: 200px; overflow-y: auto; }
        #geocoder-results div { padding: 10px 15px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
        .upload-category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .upload-category-tile input { display: none; }
        .upload-category-tile .tile-content { border: 1px solid var(--border); border-radius: 6px; padding: 12px 8px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; }
        .upload-category-tile input:checked + .tile-content { border-color: var(--accent); background: var(--bg-primary); }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="upload-card">
            <div style="text-align:center; margin-bottom:32px;">
                <h1 style="font-size:28px; font-weight:800; color:var(--text-main); margin:0;">Edit Discovery</h1>
                <p style="color:var(--text-muted); margin-top:8px;">Update your listing details below.</p>
            </div>
            <form id="editForm" enctype="multipart/form-data">
                <input type="hidden" id="productId" name="product_id" />
                <input type="hidden" id="latitude" name="latitude" />
                <input type="hidden" id="longitude" name="longitude" />

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="price">Price (Rs.)</label>
                        <input type="number" id="price" name="price" step="0.01" min="0" required />
                    </div>
                    <div class="form-group">
                        <label for="condition">Condition</label>
                        <select id="condition" name="condition">
                            <option value="new">Pristine (New)</option>
                            <option value="like_new">Excellent (Like New)</option>
                            <option value="good">Great (Good)</option>
                            <option value="fair">Aged (Fair)</option>
                            <option value="poor">Poor</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Discovery categories <small style="color:var(--text-muted);">(select all that apply)</small></label>
                    <div class="upload-category-grid" id="categoryGrid">
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="women"><span class="tile-content">Women</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="men"><span class="tile-content">Men</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="kids"><span class="tile-content">Kids</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="designer"><span class="tile-content">Designer</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="home_decor"><span class="tile-content">Home Decor</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="books"><span class="tile-content">Books</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="shoes"><span class="tile-content">Footwear</span></label>
                        <label class="upload-category-tile"><input type="checkbox" name="categories" value="accessories"><span class="tile-content">Accessories</span></label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="style">Style</label>
                    <select id="style" name="style">
                        <option value="">Select Style</option>
                        <option value="vintage">Vintage</option>
                        <option value="modern">Modern</option>
                        <option value="bohemian">Bohemian</option>
                        <option value="elegant">Elegant</option>
                        <option value="street">Streetstyle</option>
                    </select>
                </div>

                <div class="form-group" style="position:relative;">
                    <label for="location">Location</label>
                    <input type="text" id="location" name="location" placeholder="Search for a city or area..." />
                    <div id="geocoder-results"></div>
                    <div class="form-row" style="margin-top:12px;">
                        <input type="text" id="country" name="country" readonly placeholder="Country" style="padding:12px; border:1px solid var(--border); border-radius:8px; background:#f8f9fa;">
                        <input type="text" id="city" name="city" readonly placeholder="City" style="padding:12px; border:1px solid var(--border); border-radius:8px; background:#f8f9fa;">
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required></textarea>
                </div>

                <div class="form-group">
                    <label>Current images</label>
                    <div class="image-preview-grid" id="existingImages"></div>
                </div>

                <div class="form-group">
                    <label>Replace images (optional, max 5)</label>
                    <div class="image-upload-area" id="imageUploadArea">
                        <span>Click to upload new images — replaces all current photos if selected</span>
                    </div>
                    <input type="file" id="imageInput" name="images[]" accept="image/*" multiple style="display:none;" />
                    <div class="image-preview-grid" id="newImagePreview"></div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="submit-btn"><i class="fa-solid fa-check"></i> Save Changes</button>
                    <a href="#" id="cancelLink" class="cancel-btn">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        let dashboardUrl = 'home.html';
        let selectedFiles = [];
        const VALID_CATEGORIES = ['women', 'men', 'kids', 'designer', 'home_decor', 'books', 'shoes', 'accessories'];

        function parseStoredCategories(cat) {
            if (!cat) return [];
            const lower = cat.toLowerCase();
            if (lower.includes(',')) {
                return lower.split(',').map(c => c.trim()).filter(c => VALID_CATEGORIES.includes(c));
            }
            if (VALID_CATEGORIES.includes(lower)) return [lower];
            if (lower === 'home_decor' || lower.startsWith('home_decor')) return ['home_decor'];
            const parts = lower.split('_').filter(Boolean);
            return parts.filter(p => VALID_CATEGORIES.includes(p));
        }

        function setCategoryCheckboxes(catString) {
            const selected = parseStoredCategories(catString);
            document.querySelectorAll('#categoryGrid input[name="categories"]').forEach(cb => {
                cb.checked = selected.includes(cb.value);
            });
        }

        async function checkLoginStatus() {
            const response = await fetch('backend/get_user_preferences.php');
            const data = await response.json();
            if (!data.logged_in) {
                window.location.href = 'login.html';
                return null;
            }
            if (data.user_id) {
                dashboardUrl = 'curator_profile.html?id=' + data.user_id;
                document.getElementById('cancelLink').href = dashboardUrl;
            }
            return data.user_id;
        }

        async function loadProductForEdit() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (!id) {
                alert('No product ID provided');
                window.location.href = dashboardUrl;
                return;
            }

            document.getElementById('productId').value = id;
            const res = await fetch('backend/get_product_detail.php?id=' + id);
            const data = await res.json();
            if (!data.success) {
                alert(data.message || 'Failed to load product');
                window.location.href = dashboardUrl;
                return;
            }
            if (!data.is_owner) {
                alert('You can only edit your own listings.');
                window.location.href = dashboardUrl;
                return;
            }

            const p = data.product;
            document.getElementById('title').value = p.title || '';
            document.getElementById('description').value = p.description || '';
            document.getElementById('price').value = p.price || '';
            document.getElementById('location').value = p.location || '';
            document.getElementById('country').value = p.country || '';
            document.getElementById('city').value = p.city || '';
            document.getElementById('latitude').value = p.latitude || '';
            document.getElementById('longitude').value = p.longitude || '';
            document.getElementById('condition').value = p.condition_enum || 'good';
            document.getElementById('style').value = p.style || '';

            setCategoryCheckboxes(p.category || '');

            const existingGrid = document.getElementById('existingImages');
            existingGrid.innerHTML = '';
            (data.images || []).forEach(img => {
                const div = document.createElement('div');
                div.className = 'image-preview-item';
                const imgEl = document.createElement('img');
                imgEl.src = img.image_path;
                imgEl.onerror = () => { imgEl.src = 'uploads/placeholder.jpg'; };
                div.appendChild(imgEl);
                existingGrid.appendChild(div);
            });
        }

        const imageUploadArea = document.getElementById('imageUploadArea');
        const imageInput = document.getElementById('imageInput');
        const newImagePreview = document.getElementById('newImagePreview');

        imageUploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', () => {
            selectedFiles = Array.from(imageInput.files).slice(0, 5);
            newImagePreview.innerHTML = '';
            selectedFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const div = document.createElement('div');
                    div.className = 'image-preview-item';
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    div.appendChild(img);
                    newImagePreview.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const checkedCats = document.querySelectorAll('#categoryGrid input[name="categories"]:checked');
            if (checkedCats.length === 0) {
                alert('Select at least one discovery category.');
                return;
            }
            const formData = new FormData(e.target);
            formData.delete('images[]');
            formData.delete('categories');
            checkedCats.forEach(cb => formData.append('categories[]', cb.value));
            selectedFiles.forEach(file => formData.append('images[]', file));

            const res = await fetch('backend/update_product.php', { method: 'POST', body: formData });
            const result = await res.json();
            if (result.success) {
                window.location.href = dashboardUrl;
            } else {
                alert(result.message || 'Update failed');
            }
        });

        // Location search (Nominatim)
        const addressInput = document.getElementById('location');
        const resultsDiv = document.getElementById('geocoder-results');
        let searchTimeout;
        addressInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            const query = addressInput.value.trim();
            if (query.length < 3) {
                resultsDiv.style.display = 'none';
                return;
            }
            searchTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5&addressdetails=1`)
                    .then(res => res.json())
                    .then(data => {
                        resultsDiv.innerHTML = '';
                        if (!data.length) {
                            resultsDiv.style.display = 'none';
                            return;
                        }
                        resultsDiv.style.display = 'block';
                        data.forEach(item => {
                            const div = document.createElement('div');
                            div.textContent = item.display_name;
                            div.onclick = () => selectLocation(item);
                            resultsDiv.appendChild(div);
                        });
                    });
            }, 300);
        });

        function selectLocation(item) {
            addressInput.value = item.display_name;
            resultsDiv.style.display = 'none';
            document.getElementById('latitude').value = item.lat;
            document.getElementById('longitude').value = item.lon;
            const addr = item.address || {};
            document.getElementById('city').value = addr.city || addr.town || addr.village || addr.suburb || '';
            document.getElementById('country').value = addr.country || '';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkLoginStatus();
            await loadProductForEdit();
        });
    </script>
</body>
</html>
